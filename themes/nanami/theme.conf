# Theme: Nanami
# Yellow and red — bold and energetic like summer fireworks

[colors]
# Primary palette
primary = "#e6c855"
primary_light = "#f0da7a"
primary_dark = "#c44b4b"
bg = "#1a1418"
bg_light = "#261e22"
bg_surface = "#332830"
fg = "#f0e6d8"
fg_dim = "#b8a898"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #261e22 0%, #332830 50%, #2a2028 100%)"
waybar_border = "#e6c855"
waybar_shadow = "rgba(230, 200, 85, 0.25)"
waybar_text = "#f0e6d8"
waybar_active_bg = "linear-gradient(135deg, #e6c855, #c44b4b)"

# Niri
niri_focus_active = "#e6c855"
niri_focus_inactive = "#332830"
niri_shadow = "#0007"

# Fastfetch
ff_color = "yellow"

# Ghostty terminal
ghostty_bg = "#1a1418"
ghostty_fg = "#f0e6d8"
ghostty_opacity = "0.8"

# Nvim
nvim_colorscheme = "catppuccin-mocha"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/nanami.jpg"

# Icons
waybar_workspace_active = "●"
waybar_workspace_default = "○"
waybar_clock_icon = "🌙"
