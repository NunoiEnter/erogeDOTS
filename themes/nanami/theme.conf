# Theme: Nanami
# Dark purple/violet aesthetic - cool and elegant

[colors]
primary = "#bd93f9"
primary_light = "#d2a8ff"
primary_dark = "#8866cc"
bg = "#282a36"
bg_light = "#343746"
bg_surface = "#44475a"
fg = "#f8f8f2"
fg_dim = "#6272a4"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #3a3552 0%, #44475a 50%, #3d3a5c 100%)"
waybar_border = "#6272a4"
waybar_shadow = "rgba(139, 130, 210, 0.25)"
waybar_text = "#f8f8f2"
waybar_active_bg = "linear-gradient(135deg, #bd93f9, #d2a8ff)"

# Niri
niri_focus_active = "#bd93f9"
niri_focus_inactive = "#44475a"
niri_shadow = "#0007"

# Fastfetch
ff_color = "magenta"

# Foot terminal
foot_bg = "#282a36"
foot_fg = "#f8f8f2"
foot_alpha = "0.85"

# Nvim
nvim_colorscheme = "dracula"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/nanami.jpg"

# Icons
waybar_workspace_active = "●"
waybar_workspace_default = "○"
waybar_clock_icon = "🌙"
