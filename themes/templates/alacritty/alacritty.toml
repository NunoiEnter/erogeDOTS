# Alacritty config — generated by theme-switch

[env]
TERM = "xterm-256color"

[window]
padding = { x = 8, y = 8 }
opacity = 0.8
dynamic_padding = true
decorations = "None"

[scrolling]
history = 10000

[font]
size = 11.0

[cursor]
style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true

[colors.primary]
background = "{{BG}}"
foreground = "{{FG}}"

[colors.cursor]
text = "{{BG}}"
cursor = "{{PRIMARY}}"

[colors.selection]
text = "{{BG}}"
background = "{{PRIMARY}}"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "{{PRIMARY}}"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "{{PRIMARY_LIGHT}}"
cyan    = "#7dcfff"
white   = "{{FG}}"
