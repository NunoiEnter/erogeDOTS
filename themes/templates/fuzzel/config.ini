{
    "name": "fuzzel",
    "width": 24,
    "lines": 8,
    "prompt": "=> ",
    "font": "monospace:size=12",
    "dpi-aware": "yes",
    "layer": "overlay",
    "anchor": "top-left",
    "x-offset": 15,
    "y-offset": 60,

    "colors": {
        "background": "{{BG}}f2",
        "text": "{{FG}}",
        "match": "{{PRIMARY}}",
        "selection": "{{PRIMARY_LIGHT}}",
        "selection-text": "{{BG}}",
        "border": "{{PRIMARY}}"
    },

    "border": {
        "width": 2,
        "radius": 12
    }
}
