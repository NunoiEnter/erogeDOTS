# Kitty config — generated by theme-switch

# Font
font_family      monospace
font_size        11.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Cursor
cursor_shape          beam
cursor_blink_interval 0.5
shell_integration     enabled

# Window
window_padding_width  8
hide_window_decorations yes
confirm_os_window_close 0
background_opacity    0.8
dynamic_background_opacity yes

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no

# Mouse
mouse_hide_wait 3.0

# Colors — overridden by theme-switch
background            {{BG}}
foreground            {{FG}}
cursor                {{PRIMARY}}
selection_background  {{PRIMARY}}
selection_foreground  {{BG}}

# Tab colors
active_tab_background   {{PRIMARY}}
active_tab_foreground   {{BG}}
inactive_tab_background {{BG}}
inactive_tab_foreground {{FG}}

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  {{PRIMARY}}
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 {{PRIMARY_LIGHT}}
color14 #7dcfff
color15 {{FG}}
