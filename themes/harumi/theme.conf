# Theme: Harumi (default)
# Pink/cute aesthetic - gentle and sweet

[colors]
# Primary palette
primary = "#ff8fb1"
primary_light = "#ffc4dd"
primary_dark = "#d67a99"
bg = "#1a1b26"
bg_light = "#24283b"
bg_surface = "#2f3347"
fg = "#c0caf5"
fg_dim = "#a9b1d6"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #ffe4ef 0%, #fff5f8 50%, #ffe9f2 100%)"
waybar_border = "#ffb6c9"
waybar_shadow = "rgba(255, 143, 177, 0.25)"
waybar_text = "#7a3b52"
waybar_active_bg = "linear-gradient(135deg, #ff9ec4, #ffc4dd)"

# Niri
niri_focus_active = "#ff8fb1"
niri_focus_inactive = "#505050"
niri_shadow = "#0007"

# Fastfetch
ff_color = "magenta"

# Ghostty terminal
ghostty_bg = "#1a1b26"
ghostty_fg = "#c0caf5"
ghostty_opacity = "0.8"

# Nvim
nvim_colorscheme = "tokyonight"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/harumi.jpg"

# Icons
waybar_workspace_active = "◆"
waybar_workspace_default = "◇"
waybar_clock_icon = "🌸"
