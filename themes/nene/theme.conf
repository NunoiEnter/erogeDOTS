# Theme: Nene
# Lavender/purple aesthetic - gentle and dreamy

[colors]
# Primary palette - soft lavender
primary = "#b4a7d6"
primary_light = "#d4ccec"
primary_dark = "#8e7fb8"
bg = "#1e1b2e"
bg_light = "#2a2640"
bg_surface = "#353050"
fg = "#e0daf0"
fg_dim = "#b8b0cc"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #e8e0f5 0%, #f5f0ff 50%, #ede5fa 100%)"
waybar_border = "#c9b8e8"
waybar_shadow = "rgba(180, 167, 214, 0.25)"
waybar_text = "#5a4d7a"
waybar_active_bg = "linear-gradient(135deg, #b4a7d6, #d4ccec)"

# Niri
niri_focus_active = "#b4a7d6"
niri_focus_inactive = "#353050"
niri_shadow = "#0007"

# Fastfetch
ff_color = "magenta"

# Ghostty terminal
ghostty_bg = "#1e1b2e"
ghostty_fg = "#e0daf0"
ghostty_opacity = "0.8"

# Nvim
nvim_colorscheme = "catppuccin-mocha"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/nene.jpg"

# Icons
waybar_workspace_active = "◇"
waybar_workspace_default = "○"
waybar_clock_icon = "💜"

# Character
char_name = "綾地寧々"
char_full = "Ayachi Nene"
char_game = "Sanoba Witch"
char_quote = "あなたがいてくれて、本当に良かった"
