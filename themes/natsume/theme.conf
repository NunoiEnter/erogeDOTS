# Theme: Natsume
# Warm pastel dark theme - calm and refined

[colors]
primary = "#cba6f7"
primary_light = "#f5c2e7"
primary_dark = "#a6adc8"
bg = "#1e1e2e"
bg_light = "#313244"
bg_surface = "#45475a"
fg = "#cdd6f4"
fg_dim = "#a6adc8"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #313244 0%, #45475a 50%, #383a52 100%)"
waybar_border = "#cba6f7"
waybar_shadow = "rgba(203, 166, 247, 0.25)"
waybar_text = "#cdd6f4"
waybar_active_bg = "linear-gradient(135deg, #cba6f7, #f5c2e7)"

# Niri
niri_focus_active = "#cba6f7"
niri_focus_inactive = "#45475a"
niri_shadow = "#0007"

# Fastfetch
ff_color = "magenta"

# Foot terminal
foot_bg = "#1e1e2e"
foot_fg = "#cdd6f4"
foot_alpha = "0.85"

# Nvim
nvim_colorscheme = "catppuccin-mocha"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/natsume.jpg"

# Icons
waybar_workspace_active = "■"
waybar_workspace_default = "□"
waybar_clock_icon = "🍡"
