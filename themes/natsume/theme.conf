# Theme: Natsume
# Brown, light blue, yellow — warm and cozy like a café

[colors]
# Primary palette
primary = "#c4956a"
primary_light = "#7ec8e3"
primary_dark = "#8b6344"
bg = "#1c1712"
bg_light = "#2a2118"
bg_surface = "#352b20"
fg = "#e8dcc8"
fg_dim = "#b8a890"

# Waybar
waybar_bg_gradient = "linear-gradient(135deg, #2a2118 0%, #352b20 50%, #2e2419 100%)"
waybar_border = "#c4956a"
waybar_shadow = "rgba(196, 149, 106, 0.25)"
waybar_text = "#e8dcc8"
waybar_active_bg = "linear-gradient(135deg, #c4956a, #7ec8e3)"

# Niri
niri_focus_active = "#e6c855"
niri_focus_inactive = "#352b20"
niri_shadow = "#0007"

# Fastfetch
ff_color = "yellow"

# Kitty terminal
kitty_bg = "#1c1712"
kitty_fg = "#e8dcc8"
kitty_opacity = "0.8"

# Nvim
nvim_colorscheme = "tokyonight"

# Wallpaper
wallpaper = "~/erogeDOTS/wallpapers/natsume.jpg"

# Icons
waybar_workspace_active = "■"
waybar_workspace_default = "□"
waybar_clock_icon = "🍡"
